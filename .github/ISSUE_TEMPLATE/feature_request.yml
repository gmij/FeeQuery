name: 功能请求
description: 建议新功能或改进现有功能
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: 请求类型
      options:
        - 新的云厂商适配器
        - 新的通知渠道
        - 界面和交互改进
        - 性能优化
        - 配置和部署相关
        - 其他功能
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      placeholder: 请描述你希望添加或改进的功能...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 使用场景
      placeholder: 这个功能能解决什么问题？你是在什么情况下需要它？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      placeholder: 你是否考虑过其他解决方式？

  - type: checkboxes
    id: contribution
    attributes:
      label: 贡献意向
      options:
        - label: 我愿意提交 PR 来实现这个功能
