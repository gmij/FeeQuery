name: 缺陷报告
description: 报告程序错误或异常行为
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你报告问题！请尽量填写以下信息以便快速定位。
        **安全提示：请不要在此粘贴真实的 API Key、AccessKey 或账号密码信息。**

  - type: input
    id: version
    attributes:
      label: FeeQuery 版本
      placeholder: "例如：v1.0.0 或 Docker 镜像 tag（docker images 查看）"
    validations:
      required: true

  - type: dropdown
    id: cloud-provider
    attributes:
      label: 涉及的云厂商（可选）
      options:
        - 不涉及特定云厂商
        - 阿里云
        - 腾讯云
        - 华为云
        - 百度云
        - 火山引擎
        - MiniMax
        - SiliconFlow
        - 万界坊州

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      placeholder: 请描述你遇到的问题...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 进入"账号管理"页面
        2. 点击"添加账号"
        3. 填写 xxx 并保存
        4. 看到错误 "..."

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      placeholder: 你期望发生什么？

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 粘贴 logs/ 目录下的相关错误日志（务必脱敏，删除所有 API Key 等敏感字段）
      render: shell

  - type: input
    id: os
    attributes:
      label: 运行环境
      placeholder: "例如：Docker on Ubuntu 22.04 / Windows 11 本地运行"
